<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의하기 | Contact Us</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #0a0a0a;
    --text-color: #ffffff;
    --label-color: #5a5a6a;
    --subtitle-color: #3d3d4d;
    --divider-color: #1e1e2e;
    --input-bg: #1a1a1a;
    --input-border: #333;
    --accent-color: #a78bfa;
    --accent-gradient: linear-gradient(135deg, #7c3aed, #a855f7);
  }

  [data-theme="light"] {
    --bg-color: #f8fafc;
    --text-color: #0f172a;
    --label-color: #64748b;
    --subtitle-color: #475569;
    --divider-color: #e2e8f0;
    --input-bg: #ffffff;
    --input-border: #cbd5e1;
    --accent-color: #7c3aed;
    --accent-gradient: linear-gradient(135deg, #7c3aed, #a855f7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-color);
    color: var(--text-color);
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background-color 0.3s ease, color 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(120, 80, 255, 0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 100%, rgba(255, 200, 0, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: center;
    gap: 30px;
    z-index: 100;
  }

  nav a {
    text-decoration: none;
    color: var(--label-color);
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--accent-color); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 100px 24px 60px;
  }

  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 42px;
    text-align: center;
    margin-bottom: 12px;
  }

  .subtitle {
    text-align: center;
    color: var(--subtitle-color);
    font-size: 15px;
    margin-bottom: 40px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 13px;
    color: var(--label-color);
    font-weight: 500;
  }

  input, select, textarea {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-color);
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
  }

  .phone-input-group {
    display: flex;
    gap: 8px;
  }

  .country-code {
    width: 80px;
    flex-shrink: 0;
  }

  textarea {
    resize: vertical;
    min-height: 120px;
  }

  .submit-btn {
    background: var(--accent-gradient);
    color: white;
    border: none;
    padding: 16px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    margin-top: 10px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
  }

  .submit-btn:active {
    transform: scale(0.98);
  }

  .theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    background: none;
    border: 1px solid var(--label-color);
    color: var(--text-color);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    z-index: 10;
  }

  @media (max-width: 480px) {
    h1 { font-size: 34px; }
    .container { padding-top: 80px; }
  }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark Mode</button>
<div class="bg-glow"></div>

<nav>
  <a href="index.html">Home</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">
  <h1>문의하기</h1>
  <p class="subtitle">궁금한 점이 있다면 아래 양식을 작성해 주세요.</p>

  <form action="https://formspree.io/f/mlgygejz" method="POST">
    <div class="form-group">
      <label for="name">이름</label>
      <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
    </div>

    <div class="form-group">
      <label for="nationality">국적</label>
      <input type="text" id="nationality" name="nationality" placeholder="국적을 입력하세요" required>
    </div>

    <div class="form-group">
      <label for="age">나이</label>
      <input type="number" id="age" name="age" placeholder="나이를 입력하세요" required>
    </div>

    <div class="form-group">
      <label for="phone">전화번호</label>
      <div class="phone-input-group">
        <input type="text" class="country-code" id="country-code" name="country_code" placeholder="+82" required>
        <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" style="flex: 1;" required>
      </div>
    </div>

    <div class="form-group">
      <label for="message">요청사항</label>
      <textarea id="message" name="message" placeholder="내용을 입력해 주세요" required></textarea>
    </div>

    <button type="submit" class="submit-btn">보내기</button>
  </form>
</div>

<script>
  function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    const currentTheme = body.getAttribute('data-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    
    body.setAttribute('data-theme', newTheme);
    btn.textContent = newTheme === 'light' ? '☀️ Light Mode' : '🌙 Dark Mode';
    localStorage.setItem('theme', newTheme);
  }

  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.body.setAttribute('data-theme', savedTheme);
  document.getElementById('themeToggle').textContent = savedTheme === 'light' ? '☀️ Light Mode' : '🌙 Dark Mode';
</script>
</body>
</html>
